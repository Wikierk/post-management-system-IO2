version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: poczta_db
    environment:
      POSTGRES_USER: poczta_admin
      POSTGRES_PASSWORD: poczta_password
      POSTGRES_DB: poczta_db
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: